<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Content OS</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div class="mobile-top">
    <button class="menu-btn" id="menuBtn" aria-label="打开导航">☰</button>
    <strong>AI Content OS</strong>
    <button class="btn ghost" id="mobileResetBtn">重置 mock</button>
  </div>
  <div class="overlay" id="overlay"></div>

  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">AI</span>
        <div>
          <h1>AI Content OS</h1>
          <p>围绕 Content 对象运转的 AI 内容操作系统。</p>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-card">
        <strong>本地架构 V1</strong>
        <span>Mock 数据 · localStorage · AI Router 占位</span>
        <button class="btn ghost" id="resetMockBtn">清空并重建 mock</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="pageEyebrow">Dashboard</p>
          <h2 id="pageTitle">今日工作台</h2>
          <p id="pageSubtitle">今天该优先处理哪些海外 AI 热点，一眼看清。</p>
        </div>
        <div class="top-actions">
          <input id="globalSearch" placeholder="全局搜索 Content / 标签 / 来源..." />
          <button class="btn" id="newContentTopBtn">新增 Content</button>
        </div>
      </header>

      <div class="layout">
        <section class="content-area" id="app"></section>
        <aside class="copilot">
          <div class="card sticky">
            <h3>AI Copilot</h3>
            <p id="copilotText">今天建议优先处理 finalScore 最高的 3 条内容。适合先做短视频，再改写成小红书图文。</p>
            <div class="divider"></div>
            <div class="mini-stack" id="systemHealth"></div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
